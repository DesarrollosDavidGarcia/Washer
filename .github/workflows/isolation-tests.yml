name: Isolation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  isolation:
    name: cross-tenant-leak-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # SHA de actions/checkout@v4 — actualizar con Dependabot
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.0.203'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore TallerPro.Linux.slnf --locked-mode

      - name: Build
        run: dotnet build TallerPro.Linux.slnf --no-restore -c Release

      - name: Run Isolation Tests
        run: dotnet test tests/TallerPro.Isolation.Tests --no-build -c Release --logger "trx" --results-directory IsolationResults

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: isolation-test-results
          path: IsolationResults/
